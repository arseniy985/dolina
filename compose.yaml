services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./deploy/.env.production
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dolina

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "127.0.0.1:${HOST_NGINX_PORT:-13010}:80"
    volumes:
      - ./deploy/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dolina

networks:
  dolina:
    driver: bridge
